<div
  class="cwc-widget"
  [ngClass]="status.class"
>
  <header class="cwc-widget__header">
    <span class="cwc-widget__location-icon" aria-hidden="true">
      <svg class="cwc-widget__location-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 21s7-4.35 7-10a7 7 0 1 0-14 0c0 5.65 7 10 7 10z"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linejoin="round"
        />
        <circle cx="12" cy="11" r="2.25" stroke="currentColor" stroke-width="1.5" />
      </svg>
    </span>
    <span class="cwc-widget__city" *ngIf="cityName; else noCity">
      {{ cityName }}
    </span>
    <ng-template #noCity>
      <span class="cwc-widget__city cwc-widget__city--muted">—</span>
    </ng-template>
  </header>

  <div class="cwc-widget__time-row">
    <time class="cwc-widget__time" [attr.datetime]="displayTime">
      {{ displayTime }}
    </time>
    <span class="cwc-widget__status-icon" aria-hidden="true">{{ status.icon }}</span>
  </div>

  <div class="cwc-widget__footer">
    <span
      class="cwc-widget__badge"
      [style.--badge-accent]="status.color"
    >
      {{ status.label }}
    </span>
  </div>
</div>
